<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>n o t  a l l  s t a t i c  i s  m u t e</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

canvas {
  border: 1px solid #000;
  touch-action: none;
}
</style>
</head>

<body>

<canvas id="canvas" width="700" height="700"></canvas>

<audio id="bgAudio"
  src="https://archive.org/download/not_all_static/not_all_static.mp3"
  crossorigin="anonymous">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("bgAudio");

const W = canvas.width;
const H = canvas.height;

const SEGMENT_DURATION = 3;

let audioReady = false;
let audioUnlocked = false;

// tracce visive
let clicks = [];

// =====================
// AUDIO MAP
// =====================
function mouseToTime(x) {
  const dur = audio.duration || 60;
  return Math.min((x / W) * dur, dur - SEGMENT_DURATION);
}

// =====================
// UNLOCK AUDIO (critico su mobile)
// =====================
function unlockAudio() {
  if (audioUnlocked) return;

  const silent = audio.play();
  if (silent !== undefined) {
    silent.then(() => {
      audio.pause();
      audio.currentTime = 0;
      audioUnlocked = true;
    }).catch(() => {});
  }
}

// =====================
// INPUT HANDLER (robusto)
// =====================
function getXY(e) {
  const rect = canvas.getBoundingClientRect();

  // offsetX/Y più affidabili su canvas
  let x = e.offsetX;
  let y = e.offsetY;

  // fallback touch
  if (x === undefined) {
    x = e.touches ? e.touches[0].clientX - rect.left : 0;
    y = e.touches ? e.touches[0].clientY - rect.top : 0;
  }

  return { x, y };
}

// =====================
// POINTER / TOUCH DOWN
// =====================
function handleDown(e) {
  e.preventDefault();

  unlockAudio();

  const { x, y } = getXY(e);

  // traccia visiva immediata
  clicks.push({ x, y, life: 1 });

  if (!audioReady) return;

  audio.currentTime = mouseToTime(x);

  audio.play().catch(()=>{});

  setTimeout(() => {
    audio.pause();
  }, SEGMENT_DURATION * 1000);
}

canvas.addEventListener("pointerdown", handleDown, { passive: false });
canvas.addEventListener("touchstart", handleDown, { passive: false });

// =====================
// DRAW
// =====================
function drawNoise() {
  const size = 2;
  for (let y = 0; y < H; y += size) {
    for (let x = 0; x < W; x += size) {
      const v = 200 + Math.random() * 100;
      ctx.fillStyle = `rgb(${v},${v},${v})`;
      ctx.fillRect(x, y, size, size);
    }
  }
}

// tracce persistenti
function drawClicks() {
  clicks.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, 10 * c.life, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,0,0,${c.life})`;
    ctx.stroke();

    c.life -= 0.03;
  });

  clicks = clicks.filter(c => c.life > 0);
}

// =====================
// LOOP
// =====================
function animate() {
  ctx.clearRect(0, 0, W, H);

  drawNoise();
  drawClicks();

  requestAnimationFrame(animate);
}
animate();

// audio ready
audio.addEventListener("canplaythrough", () => {
  audioReady = true;
});
</script>

</body>
</html>
