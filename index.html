<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>n o t  a l l  s t a t i c  i s  m u t e</title>

<style>
  body {
    margin: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
  }
  canvas {
    border: 1px solid #000;
    touch-action: none;
  }
</style>
</head>

<body>

<canvas id="canvas" width="500" height="500"></canvas>

<audio id="bgAudio"
  src="https://archive.org/download/not_all_static/not_all_static.mp3"
  preload="auto"
  playsinline>
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("bgAudio");

const W = canvas.width;
const H = canvas.height;

const SEGMENT_DURATION = 3;

// ⚠️ NON aspettiamo più canplaythrough
let audioReady = false;

// =====================
// AUDIO MAPPING
// =====================
function pointerToTime(x) {
  const dur = audio.duration || 60;
  return Math.min((x / W) * dur, dur - SEGMENT_DURATION);
}

// =====================
// POINTER STATE
// =====================
let pointer = { x: W/2, y: H/2, stillness: 0 };
let last = null;

// =====================
// DEVICE DETECTION
// =====================
const isTouchDevice = window.matchMedia("(pointer: coarse)").matches;

// =====================
// AUDIO UNLOCK (FIX iPad)
// =====================
let unlocked = false;

function unlockAudio() {
  if (unlocked) return;

  const p = audio.play();
  if (p !== undefined) {
    p.then(() => {
      audio.pause();
      audio.currentTime = 0;
      unlocked = true;
      audioReady = true; // ✅ attiviamo qui
    }).catch(()=>{});
  }
}

// =====================
// PLAY SEGMENT (FIX)
// =====================
function playSegment(x){
  if (!audioReady) return;

  try {
    audio.pause(); // importante su iPad
    audio.currentTime = pointerToTime(x);

    const p = audio.play();
    if (p !== undefined) {
      p.catch(()=>{});
    }

    setTimeout(() => {
      audio.pause();
    }, SEGMENT_DURATION * 1000);

  } catch(e){}
}

// =====================
// DESKTOP
// =====================
if(!isTouchDevice){

  canvas.addEventListener("pointerdown", e => {
    canvas.setPointerCapture(e.pointerId);
    unlockAudio();

    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;

    pointer.x = x;
    pointer.y = y;
    last = { x, y };

    playSegment(x);
  });

  canvas.addEventListener("pointermove", e => {
    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;

    if (last) {
      const d = Math.hypot(x - last.x, y - last.y);
      pointer.stillness += (d < 1.2) ? 0.12 : -0.18;
      pointer.stillness = Math.max(0, Math.min(pointer.stillness, 1));
    }

    pointer.x = x;
    pointer.y = y;
    last = { x, y };
  });

} else {

  // =====================
  // TABLET / iPad FIX
  // =====================
  let isTouching = false;

  canvas.addEventListener("touchstart", e => {
    e.preventDefault();

    unlockAudio(); // ⚠️ fondamentale

    isTouching = true;

    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();

    const x = t.clientX - r.left;
    const y = t.clientY - r.top;

    pointer.x = x;
    pointer.y = y;
    last = { x, y };

    // ⚠️ piccolo delay = stabilità WebKit
    setTimeout(() => {
      playSegment(x);
    }, 30);

  }, {passive:false});

  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    if(!isTouching) return;

    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();

    const x = t.clientX - r.left;
    const y = t.clientY - r.top;

    if (last) {
      const d = Math.hypot(x - last.x, y - last.y);
      pointer.stillness += (d < 1.2) ? 0.12 : -0.18;
      pointer.stillness = Math.max(0, Math.min(pointer.stillness, 1));
    }

    pointer.x = x;
    pointer.y = y;
    last = { x, y };

  }, {passive:false});

  canvas.addEventListener("touchend", ()=>{
    isTouching = false;
  });

}

// =====================
// NOISE
// =====================
let noiseImage = ctx.createImageData(W, H);

function drawNoise() {
  const data = noiseImage.data;

  for (let i = 0; i < data.length; i += 4) {
    const v = 200 + Math.random() * 55;
    data[i] = v;
    data[i+1] = v;
    data[i+2] = v;
    data[i+3] = 255;
  }

  ctx.putImageData(noiseImage, 0, 0);

  ctx.fillStyle = "rgba(0,0,0,0.06)";
  for (let y = 0; y < H; y += 6) {
    ctx.fillRect(0, y, W, 1);
  }
}

// =====================
// CLUSTER
// =====================
function drawCluster() {
  if (pointer.stillness < 0.02) return;

  const strength = pointer.stillness;

  for (let i = 0; i < 140; i++) {
    const ox = (Math.random() - 0.5) * 30;
    const oy = (Math.random() - 0.5) * 30;

    ctx.fillStyle = `rgba(180,180,90,${0.25 * strength})`;
    ctx.fillRect(pointer.x + ox, pointer.y + oy, 3, 3);
  }
}

// =====================
// LOOP
// =====================
function animate() {
  ctx.clearRect(0,0,W,H);
  drawNoise();
  drawCluster();
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
