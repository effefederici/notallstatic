<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>n o t  a l l  s t a t i c  i s  m u t e</title>

<style>
  body {
    margin: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
  }
  canvas {
    border: 1px solid #000;
    touch-action: none;
  }
  .caption {
    width: 500px;
    margin-top: 14px;
    font-size: 13px;
    line-height: 1.35;
    color: #111;
  }
</style>
</head>

<body>

<canvas id="canvas" width="500" height="500"></canvas>

<audio id="bgAudio"
  src="https://archive.org/download/not_all_static/not_all_static.mp3"
  crossorigin="anonymous"
  preload="auto"
  playsinline>
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("bgAudio");

const W = canvas.width;
const H = canvas.height;

const SEGMENT_DURATION = 3;
let audioReady = false;

// =====================
// AUDIO MAPPING
// =====================
function mouseToTime(x) {
  const dur = audio.duration || 60;
  return Math.min((x / W) * dur, dur - SEGMENT_DURATION);
}

// =====================
// POINTER (UNIFIED INPUT)
// =====================
let mouse = { x: W/2, y: H/2, stillness: 0 };
let last = null;

canvas.addEventListener("pointerdown", e => {
  canvas.setPointerCapture(e.pointerId);

  unlockAudio();

  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left;
  const y = e.clientY - r.top;

  mouse.x = x;
  mouse.y = y;
  last = { x, y };

  if (audioReady) {
    audio.currentTime = mouseToTime(x);
    audio.play().catch(()=>{});
    setTimeout(() => audio.pause(), SEGMENT_DURATION * 1000);
  }
});

canvas.addEventListener("pointermove", e => {
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left;
  const y = e.clientY - r.top;

  if (last) {
    const d = Math.hypot(x - last.x, y - last.y);
    mouse.stillness += (d < 1.2) ? 0.12 : -0.18;
    mouse.stillness = Math.max(0, Math.min(mouse.stillness, 1));
  }

  mouse.x = x;
  mouse.y = y;
  last = { x, y };
});

// =====================
// AUDIO UNLOCK
// =====================
let unlocked = false;

function unlockAudio() {
  if (unlocked) return;

  const p = audio.play();
  if (p !== undefined) {
    p.then(() => {
      audio.pause();
      audio.currentTime = 0;
      unlocked = true;
    }).catch(()=>{});
  }
}

// =====================
// NOISE (OPTIMIZED)
// =====================
let noiseImage = ctx.createImageData(W, H);

function drawNoise() {
  const data = noiseImage.data;

  for (let i = 0; i < data.length; i += 4) {
    const v = 200 + Math.random() * 55;
    data[i] = v;
    data[i+1] = v;
    data[i+2] = v;
    data[i+3] = 255;
  }

  ctx.putImageData(noiseImage, 0, 0);

  ctx.fillStyle = "rgba(0,0,0,0.06)";
  for (let y = 0; y < H; y += 6) {
    ctx.fillRect(0, y, W, 1);
  }
}

// =====================
// CLUSTER
// =====================
function drawCluster() {
  if (mouse.stillness < 0.02) return;

  const strength = mouse.stillness;
  const blobs = 140;
  const spread = 30;

  for (let i = 0; i < blobs; i++) {
    const ox = (Math.random() - 0.5) * spread;
    const oy = (Math.random() - 0.5) * spread;

    const w = 2 + Math.random() * 5;
    const h = 3 + Math.random() * 5;

    const r = 160 + Math.random()*40;
    const g = 175 + Math.random()*30;
    const b = 70 + Math.random()*40;

    ctx.fillStyle = `rgba(${r},${g},${b},${0.25 * strength})`;
    ctx.fillRect(mouse.x + ox, mouse.y + oy, w, h);
  }

  for (let i = 0; i < 180; i++) {
    const ox = (Math.random() - 0.5) * spread;
    const oy = (Math.random() - 0.5) * spread;
    ctx.fillStyle = `rgba(0,0,0,${0.35 * strength})`;
    ctx.fillRect(mouse.x + ox, mouse.y + oy, 2, 2);
  }
}

// =====================
// LOADING
// =====================
let text = "audio loading";
let cursor = 0;

function drawLoading() {
  if (audioReady) return;
  cursor += 1;
  ctx.fillStyle = "#000";
  ctx.font = "22px monospace";
  ctx.textAlign = "center";
  ctx.fillText(text.slice(0, Math.floor(cursor)), W/2, H/2);
}

// =====================
// LOOP (LIMITED FPS)
// =====================
let lastFrame = 0;
const FPS = 30;

function animate(t) {
  if (t - lastFrame < 1000 / FPS) {
    requestAnimationFrame(animate);
    return;
  }
  lastFrame = t;

  ctx.clearRect(0,0,W,H);
  drawNoise();
  drawCluster();
  drawLoading();

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// =====================
// AUDIO READY
// =====================
audio.addEventListener("canplaythrough", () => {
  audioReady = true;
});
</script>

</body>
</html>
