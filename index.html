<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>n o t  a l l  s t a t i c  i s  m u t e</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

canvas {
  border: 1px solid #000;
  touch-action: none;
}
</style>
</head>

<body>

<canvas id="canvas" width="700" height="700"></canvas>

<audio id="bgAudio"
  src="https://archive.org/download/not_all_static/not_all_static.mp3"
  preload="auto"
  crossorigin="anonymous">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("bgAudio");

const W = canvas.width;
const H = canvas.height;

const SEGMENT_DURATION = 3;

let audioUnlocked = false;
let audioReady = false;

let clicks = [];

// =====================
// AUDIO STATE
// =====================
audio.addEventListener("loadedmetadata", () => {
  audioReady = true;
});

audio.addEventListener("canplay", () => {
  audioReady = true;
});

// fallback safety
setTimeout(() => {
  if (!isFinite(audio.duration)) {
    audio.load();
  }
}, 2000);

// =====================
// AUDIO MAP
// =====================
function mouseToTime(x) {
  const dur = (isFinite(audio.duration) && audio.duration > 0)
    ? audio.duration
    : 60;

  const t = (x / W) * dur;
  return Math.min(t, dur - SEGMENT_DURATION);
}

// =====================
// UNLOCK
// =====================
function unlockAudio() {
  if (audioUnlocked) return;

  const p = audio.play();
  if (p !== undefined) {
    p.then(() => {
      audio.pause();
      audio.currentTime = 0;
      audioUnlocked = true;
    }).catch(() => {});
  }
}

// =====================
// INPUT
// =====================
canvas.addEventListener("pointerdown", (e) => {
  e.preventDefault();

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  clicks.push({ x, y, life: 1 });

  unlockAudio();

  if (!isFinite(audio.duration)) {
    audio.load();
  }

  const t = mouseToTime(x);
  audio.currentTime = t;

  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {});
  }

  setTimeout(() => {
    audio.pause();
  }, SEGMENT_DURATION * 1000);

}, { passive: false });

// =====================
// DRAW
// =====================
function drawNoise() {
  const size = 2;
  for (let y = 0; y < H; y += size) {
    for (let x = 0; x < W; x += size) {
      const v = 200 + Math.random() * 100;
      ctx.fillStyle = `rgb(${v},${v},${v})`;
      ctx.fillRect(x, y, size, size);
    }
  }
}

function drawClicks() {
  clicks.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, 10 * c.life, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,0,0,${c.life})`;
    ctx.stroke();
    c.life -= 0.03;
  });

  clicks = clicks.filter(c => c.life > 0);
}

// loading text
function drawLoading() {
  if (audioReady) return;

  ctx.fillStyle = "#000";
  ctx.font = "20px monospace";
  ctx.textAlign = "center";
  ctx.fillText("audio loading", W/2, H/2);
}

// =====================
// LOOP
// =====================
function animate() {
  ctx.clearRect(0, 0, W, H);

  drawNoise();
  drawClicks();
  drawLoading();

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
