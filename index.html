<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>n o t  a l l  s t a t i c  i s  m u t e</title>

<style>
  body {
    margin: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
  }

  canvas {
    border: 1px solid #000;
    touch-action: none;
  }
</style>
</head>

<body>

<canvas id="canvas" width="700" height="700"></canvas>

<audio id="bgAudio"
  src="https://archive.org/download/not_all_static/not_all_static.mp3"
  crossorigin="anonymous">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("bgAudio");

const W = canvas.width;
const H = canvas.height;

const SEGMENT_DURATION = 3;

let audioReady = false;
let audioUnlocked = false;

// traccia persistente dei tocchi
let trails = [];

// =====================
// AUDIO MAPPING
// =====================
function mouseToTime(x) {
  const dur = audio.duration || 60;
  return Math.min((x / W) * dur, dur - SEGMENT_DURATION);
}

// =====================
// POINTER TRACKING
// =====================
let mouse = { x: W/2, y: H/2, stillness: 0 };
let last = null;

canvas.addEventListener("pointermove", e => {
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left;
  const y = e.clientY - r.top;

  if (last) {
    const d = Math.hypot(x - last.x, y - last.y);
    mouse.stillness += (d < 1.2) ? 0.12 : -0.18;
    mouse.stillness = Math.max(0, Math.min(mouse.stillness, 1));
  }

  mouse.x = x;
  mouse.y = y;
  last = { x, y };
});

// =====================
// TAP / CLICK
// =====================
async function handleActivation(e) {
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left;
  const y = e.clientY - r.top;

  // aggiunge traccia visiva persistente
  trails.push({ x, y, life: 1.0 });

  if (!audioReady) return;

  // unlock audio
  if (!audioUnlocked) {
    try {
      await audio.play();
      audio.pause();
      audioUnlocked = true;
    } catch {}
  }

  audio.currentTime = mouseToTime(x);
  audio.play().catch(()=>{});

  setTimeout(() => audio.pause(), SEGMENT_DURATION * 1000);
}

canvas.addEventListener("pointerdown", handleActivation);

// =====================
// UPDATE TRAILS
// =====================
function updateTrails() {
  trails = trails
    .map(t => ({ ...t, life: t.life - 0.02 }))
    .filter(t => t.life > 0);
}

// =====================
// DRAW TRAILS
// =====================
function drawTrails() {
  trails.forEach(t => {
    ctx.beginPath();
    ctx.arc(t.x, t.y, 8 * t.life, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,0,0,${t.life})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  });
}

// =====================
// NOISE
// =====================
function drawNoise() {
  const size = 2;
  for (let y = 0; y < H; y += size) {
    for (let x = 0; x < W; x += size) {
      const v = 200 + Math.random() * 100;
      ctx.fillStyle = `rgb(${v},${v},${v})`;
      ctx.fillRect(x, y, size, size);
    }
  }
}

// =====================
// CLUSTER
// =====================
function drawCluster() {
  if (mouse.stillness < 0.02) return;

  const strength = mouse.stillness;
  const blobs = 120;
  const spread = 25;

  for (let i = 0; i < blobs; i++) {
    const ox = (Math.random() - 0.5) * spread;
    const oy = (Math.random() - 0.5) * spread;

    ctx.fillStyle = `rgba(0,0,0,${0.2 * strength})`;
    ctx.fillRect(mouse.x + ox, mouse.y + oy, 2, 2);
  }
}

// =====================
// LOOP
// =====================
function animate() {
  ctx.clearRect(0,0,W,H);

  drawNoise();
  drawCluster();

  updateTrails();
  drawTrails();

  requestAnimationFrame(animate);
}
animate();

// audio ready
audio.addEventListener("canplaythrough", () => {
  audioReady = true;
});
</script>

</body>
</html>
